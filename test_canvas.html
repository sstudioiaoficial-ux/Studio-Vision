<!DOCTYPE html>
<html>
<head><title>Canvas Test</title></head>
<body style="margin:0;background:#030303;">
<div style="position:fixed;inset:0;z-index:0;background:#030303;overflow:hidden;pointer-events:none;">
    <canvas id="digital-canvas" style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;display:block;"></canvas>
</div>
<div id="result" style="position:relative;z-index:10;color:lime;font-family:monospace;padding:20px;font-size:14px;"></div>
<script>
    const canvas = document.getElementById('digital-canvas');
    const ctx = canvas.getContext('2d');
    const log = [];
    
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    log.push('Canvas size: ' + canvas.width + 'x' + canvas.height);
    
    // Draw test particles
    let particles = [];
    const count = 80;
    for (let i = 0; i < count; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            vx: (Math.random() - 0.5) * 0.5,
            vy: (Math.random() - 0.5) * 0.5,
            size: Math.random() * 2 + 0.5,
            opacity: Math.random() * 0.5 + 0.15
        });
    }
    log.push('Particles created: ' + particles.length);
    
    let frameCount = 0;
    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        for (let i = 0; i < particles.length; i++) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
            if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
            
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0, 219, 234, ' + p.opacity + ')';
            ctx.fill();
        }
        
        const maxDist = 160;
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const distSq = dx * dx + dy * dy;
                if (distSq < maxDist * maxDist) {
                    const dist = Math.sqrt(distSq);
                    const alpha = 0.15 * (1 - dist / maxDist);
                    ctx.beginPath();
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.strokeStyle = 'rgba(0, 219, 234, ' + alpha + ')';
                    ctx.lineWidth = 0.8;
                    ctx.stroke();
                }
            }
        }
        
        frameCount++;
        if (frameCount === 30) {
            // Check pixels after 30 frames
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let nonZero = 0;
            for (let i = 0; i < imageData.data.length; i += 4) {
                if (imageData.data[i+3] > 0) nonZero++;
            }
            log.push('After 30 frames: ' + nonZero + ' non-zero pixels out of ' + (canvas.width * canvas.height));
            log.push('Percent drawn: ' + ((nonZero / (canvas.width * canvas.height)) * 100).toFixed(4) + '%');
            log.push('RESULT: ' + (nonZero > 0 ? '✅ CANVAS IS DRAWING' : '❌ CANVAS IS NOT DRAWING'));
            document.getElementById('result').innerHTML = log.join('<br>');
        }
        
        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
